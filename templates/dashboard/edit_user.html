{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- left sidebar -->
    <!-- load the sidebar here -->

    {% include 'dashboard/sidebar.html' %}

    <!-- Right side content -->
    <div class="col-md-9">

        {% if perms.auth.add_user %}

        <h2>Edit User</h2>
        <form action="" method="post">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning text-light ">Submit</button>
        </form>

        {% else %}
        <h5>You Do not have permission To View This Page.</h5>
        {% endif %}

    </div>

</div>


{% endblock %}
