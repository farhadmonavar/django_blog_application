{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- left sidebar -->
    <!-- load the sidebar here -->

    {% include 'dashboard/sidebar.html' %}

    <!-- Right side content -->
    <div class="col-md-9">
        <h2>Add New Categories</h2>
        <form action="{% url 'add_category' %}" method="post" style="width: 500px">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning text-light ">Submit</button>
        </form>

    </div>

</div>


{% endblock %}
